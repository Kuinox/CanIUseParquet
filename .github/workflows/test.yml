name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/test_profiler.py -v

  integration-tests-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLDB
        run: |
          sudo apt-get update
          sudo apt-get install -y lldb python3-pip
      - name: Install dependencies into system Python (matches LLDB's Python)
        run: |
          # LLDB uses the system Python, so install deps there
          pip3 install --break-system-packages pyarrow pytest pytest-timeout
          pip3 install --break-system-packages -e .
      - name: Verify LLDB is functional
        run: lldb --version
      - name: Run integration tests
        run: python3 -m pytest tests/test_integration.py -v --timeout=600

  integration-tests-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install LLVM/LLDB
        run: choco install llvm -y
      - name: Add LLVM to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Check LLDB availability
        run: |
          $lldb = Get-Command lldb -ErrorAction SilentlyContinue
          if ($lldb) { Write-Host "LLDB found at $($lldb.Source)"; & $lldb.Source --version } else { Write-Host "LLDB not found" }
        continue-on-error: true
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/test_integration.py -v --timeout=600
