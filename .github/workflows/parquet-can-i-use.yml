name: Parquet Can I Use

on:
  push:
    branches: [main]
    paths:
      - 'parquet_can_i_use/**'
  pull_request:
    paths:
      - 'parquet_can_i_use/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-pyarrow:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run bisect tests for pyarrow
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only pyarrow
      - uses: actions/upload-artifact@v4
        with:
          name: results-pyarrow
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-fastparquet:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run bisect tests for fastparquet
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only fastparquet
      - uses: actions/upload-artifact@v4
        with:
          name: results-fastparquet
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-polars:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run bisect tests for polars
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only polars
      - uses: actions/upload-artifact@v4
        with:
          name: results-polars
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-duckdb:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run bisect tests for duckdb
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only duckdb
      - uses: actions/upload-artifact@v4
        with:
          name: results-duckdb
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-rust:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run bisect tests for parquet-rs
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only parquet-rs
      - uses: actions/upload-artifact@v4
        with:
          name: results-rust
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-go:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run bisect tests for parquet-go
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only parquet-go
      - uses: actions/upload-artifact@v4
        with:
          name: results-go
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-java:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run bisect tests for parquet-java
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only parquet-java
      - uses: actions/upload-artifact@v4
        with:
          name: results-java
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-dotnet:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run bisect tests for parquet-dotnet
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only parquet-dotnet
      - uses: actions/upload-artifact@v4
        with:
          name: results-dotnet
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-parquet-sharp:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Run bisect tests for parquet-sharp
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only parquet-sharp
      - uses: actions/upload-artifact@v4
        with:
          name: results-parquet-sharp
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-spark:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run bisect tests for spark
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only spark
      - uses: actions/upload-artifact@v4
        with:
          name: results-spark
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  test-trino:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Run bisect tests for trino
        run: |
          cd parquet_can_i_use
          python run_multiversion.py --bisect --only trino
      - uses: actions/upload-artifact@v4
        with:
          name: results-trino
          path: parquet_can_i_use/results/
          if-no-files-found: warn

  build-site:
    needs: [test-pyarrow, test-fastparquet, test-polars, test-duckdb, test-rust, test-go, test-java, test-dotnet, test-parquet-sharp, test-spark, test-trino]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: parquet_can_i_use/results/
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate matrix
        run: |
          # Remove any partial all_versions.json so generate_matrix.py uses individual files
          rm -f parquet_can_i_use/results/all_versions.json
          cd parquet_can_i_use
          python generate_matrix.py --load-results

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        working-directory: parquet_can_i_use/site
        env:
          NEXT_PUBLIC_BASE_PATH: /CanIUseParquet
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: parquet_can_i_use/site/out

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
